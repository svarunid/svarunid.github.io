<section class="py-8">
  <h2
    class="text-2xl font-bold mb-8 pb-2 border-b border-neutral-300 dark:border-neutral-800"
  >
    Achievements
  </h2>
  <div class="space-y-6">
    {% for item in achievements %}
    <article
      class="p-6 border border-neutral-300 dark:border-neutral-800 rounded bg-neutral-100/50 dark:bg-neutral-900/50"
    >
      <div
        class="flex flex-col md:flex-row md:items-baseline md:justify-between mb-3"
      >
        <h3
          class="text-lg font-semibold text-neutral-900 dark:text-neutral-100"
        >
          {{ item.title }}
        </h3>
        <time class="text-sm text-neutral-500 mt-1 md:mt-0"
          >{{ item.year }}</time
        >
      </div>
      <p class="text-neutral-700 dark:text-neutral-300 mb-3">
        {{ item.organization }}
      </p>
      <p class="text-sm text-neutral-600 dark:text-neutral-400">
        {{ item.description }}
      </p>
    </article>
    {% endfor %}
  </div>
</section>
